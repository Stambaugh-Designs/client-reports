<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
  :root {
    --bg: #f5f0eb; --surface: #ffffff; --surface-alt: #faf7f4;
    --border: #e8e0d8; --text: #2c2417; --text-secondary: #8c7e6e; --text-muted: #b0a494;
    --accent: #c4550a; --accent-light: #e8764a;
    --green: #2d7a3a; --green-bg: #eaf5ec; --red: #c4390a; --red-bg: #fdf0eb;
    --orange: #b5680a; --orange-bg: #fef6eb; --blue: #1a6bb5; --blue-bg: #ebf3fa;
    --header-gradient: linear-gradient(135deg, #2c1810 0%, #4a2c1a 40%, #3d2010 100%);

  .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
  .report-header { background: var(--header-gradient); padding: 48px 0 44px; position: relative; overflow: hidden; }
  .report-header::before { content: ''; position: absolute; top: -50%; right: -20%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(196,85,10,0.15) 0%, transparent 70%); pointer-events: none; }
  .report-header .container { position: relative; z-index: 1; }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #f0e6d8; margin-bottom: 20px; }
  .badge::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .header-domain { font-size: 40px; font-weight: 800; color: #ffffff; letter-spacing: -1px; margin-bottom: 6px; }
  .header-subtitle { font-size: 16px; color: #c4b8a8; margin-bottom: 24px; }

  .kpi-value { font-size: 36px; font-weight: 800; color: var(--text); line-height: 1.1; letter-spacing: -1px; }
  .kpi-value.alert { color: var(--red); }
  .kpi-trend { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; margin-top: 8px; padding: 2px 8px; border-radius: 4px; }
  .kpi-trend.up { background: var(--green-bg); color: var(--green); }
  .kpi-trend.down { background: var(--red-bg); color: var(--red); }
  .kpi-trend.neutral { background: var(--surface-alt); color: var(--text-secondary); }  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow); }

  thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }

  td.mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-size: 12px; font-weight: 700; }

  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-light)); transition: width 1s ease; }
  .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.3px; }
  .tag-green { background: var(--green-bg); color: var(--green); }
  .tag-blue { background: var(--blue-bg); color: var(--blue); }
  .tag-orange { background: var(--orange-bg); color: var(--orange); }
  .tag-red { background: var(--red-bg); color: var(--red); }
  .insight { display: flex; gap: 16px; padding: 16px; border-radius: var(--radius-sm); margin-bottom: 12px; border: 1px solid var(--border); }
  .insight:last-child { margin-bottom: 0; }
  .insight.critical { border-left: 4px solid var(--red); background: var(--red-bg); }
  .insight.warning { border-left: 4px solid var(--orange); background: var(--orange-bg); }
  .insight.positive { border-left: 4px solid var(--green); background: var(--green-bg); }
  .insight-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .insight-content h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .insight-content p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .chart-container { position: relative; height: 280px; margin: 16px 0; }
  .alert-box { display: flex; gap: 12px; align-items: flex-start; background: var(--red-bg); border: 1px solid rgba(196,57,10,0.2); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 20px; font-size: 13px; }
  .alert-box.warning { background: var(--orange-bg); border-color: rgba(181,104,10,0.2); }
  .alert-icon { font-size: 18px; flex-shrink: 0; }
  .report-footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 12px; }
  .report-footer a { color: var(--accent); text-decoration: none; }
  .report-footer a:hover { text-decoration: underline; }
  .footer-brand { font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }  .ai-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; margin: -28px 0 24px; position: relative; z-index: 2; box-shadow: var(--shadow-md); }
  .ai-summary-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .ai-summary-header .ai-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #1a1a2e, #2c1810); color: #f0e6d8; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border-radius: 6px; }
  .ai-summary-header .ai-badge::before { content: ''; width: 6px; height: 6px; background: #63b3ed; border-radius: 50%; animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .ai-summary-header h3 { font-size: 16px; font-weight: 700; color: var(--text); }
  .ai-summary-body { font-size: 14px; line-height: 1.75; color: var(--text); }
  .ai-summary-body p { margin-bottom: 12px; }
  .ai-summary-body p:last-child { margin-bottom: 0; }
  .ai-summary-body strong { color: var(--text); }

  .ai-summary-body .highlight-warn { display: inline-block; background: var(--orange-bg); color: var(--orange); font-weight: 700; padding: 1px 8px; border-radius: 4px; font-size: 13px; }
  @media (max-width: 768px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }

    .kpi-value { font-size: 28px; }
  }
</style>

<script>
(function() {
  const D = REPORT_DATA;
  document.getElementById('pageTitle').textContent = 'SEO & Analytics Report — ' + D.client.name;  function rankBadge(rank) {
    if (rank <= 3) return '<span class="rank-badge rank-' + rank + '">' + rank + '</span>';
    return rank;
  }
  function bounceTag(rate, cls) { return '<span class="tag ' + cls + '">' + rate + '</span>'; }

  // Header
  var html = '<div class="report-header"><div class="container">' +
    '<div class="badge">SEO &amp; Analytics Report</div>' +
    '<div class="header-domain">' + D.client.domain + '</div>' +
    '<div class="header-subtitle">' + D.client.name + ' — Comprehensive Performance Analysis</div>' +
    '<div class="header-meta">' +
    '<span>📅 ' + D.client.reportDateRange + '</span>' +
    '<span>📊 Data Sources: GSC · DataForSEO · Rybbit</span>' +
    '<span>🖨 Generated: ' + D.client.generatedDate + '</span>' +
    '</div></div></div><div class="container">';

  // AI Executive Summary
  html += '<div class="ai-summary"><div class="ai-summary-header">' +
    '<span class="ai-badge">AI Analysis</span><h3>Executive Summary</h3></div>' +
    '<div class="ai-summary-body">' + D.aiSummary + '</div></div>';

  // KPI Cards
  html += '<div class="kpi-grid">';
  D.kpis.forEach(function(k) {
    html += '<div class="kpi-card"><div class="kpi-label">' + k.label + '</div>' +
      '<div class="kpi-value">' + k.value + '</div>' +
      '<div class="kpi-trend ' + k.trendClass + '">' + k.trendText + '</div></div>';
  });
  html += '</div>';  // Section 01: Rybbit Analytics
  if (D.rybbit && D.rybbit.available) {
    html += '<div class="section"><div class="section-header"><div class="section-icon orange">📈</div><div>' +
      '<div class="section-number">Section 01</div><div class="section-title">Site Analytics (Rybbit)</div></div></div>';
    html += '<div class="mini-kpi-row">';
    D.rybbit.miniKpis.forEach(function(m) {
      html += '<div class="mini-kpi"><div class="value">' + m.value + '</div><div class="label">' + m.label + '</div></div>';
    });
    html += '</div>';
    if (D.rybbit.secondaryKpis && D.rybbit.secondaryKpis.length) {
      html += '<div class="mini-kpi-row" style="grid-template-columns: repeat(' + D.rybbit.secondaryKpis.length + ', 1fr);">';
      D.rybbit.secondaryKpis.forEach(function(m) {
        var st = m.style ? ' style="' + m.style + '"' : '';
        html += '<div class="mini-kpi"><div class="value"' + st + '>' + m.value + '</div><div class="label">' + m.label + '</div></div>';
      });
      html += '</div>';
    }
    if (D.rybbit.alert) {
      html += '<div class="alert-box ' + D.rybbit.alert.type + '"><span class="alert-icon">⚠️</span><div>' + D.rybbit.alert.html + '</div></div>';
    }
    if (D.rybbit.referralSources && D.rybbit.referralSources.length) {
      html += '<h4 style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-secondary);letter-spacing:0.5px;text-transform:uppercase;">Top Referral Sources</h4>';
      html += '<table><thead><tr><th>#</th><th>Source</th><th>Sessions</th><th>Share</th><th>Bounce Rate</th></tr></thead><tbody>';
      D.rybbit.referralSources.forEach(function(r) {
        html += '<tr><td>' + rankBadge(r.rank) + '</td><td><strong>' + r.source + '</strong></td><td class="mono">' + r.sessions + '</td><td class="mono">' + r.share + '</td><td>' + bounceTag(r.bounceRate, r.bounceClass) + '</td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';
  }  // Section 02: Google Search Console
  if (D.gsc && D.gsc.available) {
    html += '<div class="section"><div class="section-header"><div class="section-icon blue">🔍</div><div>' +
      '<div class="section-number">Section 02</div><div class="section-title">Google Search Console</div></div></div>';
    html += '<h4 style="font-size:14px;font-weight:700;margin-bottom:4px;">Daily Clicks &amp; Impressions</h4>' +
      '<p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">' + D.gsc.dateRangeLabel + '</p>' +
      '<div class="chart-container"><canvas id="dailyChart"></canvas></div>';
    // Top Queries
    if (D.gsc.topQueries && D.gsc.topQueries.length) {
      html += '<h4 style="font-size:14px;font-weight:700;margin:24px 0 12px;color:var(--text-secondary);letter-spacing:0.5px;text-transform:uppercase;">Top Search Queries</h4>';

      D.gsc.topQueries.forEach(function(q) {
        html += '<tr><td>' + rankBadge(q.rank) + '</td><td><strong>' + q.query + '</strong></td><td class="mono">' + q.clicks + '</td><td class="mono">' + q.impressions + '</td><td class="mono">' + q.ctr + '</td><td class="mono">' + q.avgPos + '</td></tr>';

    }

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:28px;"><div>' +

      '<table><thead><tr><th>Country</th><th>Clicks</th></tr></thead><tbody>';
    D.gsc.countries.forEach(function(c) {

    html += '</tbody></table></div></div>';
    html += '</div>';
  }

    html += '<div class="mini-kpi-row">';
    D.keywords.miniKpis.forEach(function(m) {
      var st = m.style ? ' style="' + m.style + '"' : '';

    });
    html += '</div>';
    html += '<h4 style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-secondary);letter-spacing:0.5px;text-transform:uppercase;">Keyword Position Distribution</h4>';
    html += '<table><thead><tr><th>Position Range</th><th>Keywords</th><th>Distribution</th></tr></thead><tbody>';
    D.keywords.distribution.forEach(function(d) {
      var barSt = d.barColor ? 'background:' + d.barColor + ';' : '';
      html += '<tr><td><span class="tag ' + d.tagClass + '">' + d.range + '</span></td><td class="mono"><strong>' + d.count + '</strong></td><td><div class="progress-bar" style="width:200px;"><div class="progress-fill" style="width:' + d.pct + '%;' + barSt + '"></div></div></td></tr>';
    });
    html += '</tbody></table>';    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;">' +
      '<div class="mini-kpi"><div class="value">' + D.keywords.etv + '<span style="font-size:14px;color:var(--text-secondary);">/mo</span></div><div class="label">Estimated Traffic Value</div></div>' +
      '<div class="mini-kpi"><div class="value">' + D.keywords.estVisits + '</div><div class="label">Est. Organic Visits/Mo</div></div></div>';
    html += '<div class="chart-container" style="height:220px;margin-top:16px;"><canvas id="keywordChart"></canvas></div>';

    // Top Keyword Rankings Table
    if (D.keywords.topRankings && D.keywords.topRankings.length) {
      html += '<h4 style="font-size:14px;font-weight:700;margin:28px 0 12px;color:var(--text-secondary);letter-spacing:0.5px;text-transform:uppercase;">Top Keyword Rankings</h4>';
      html += '<div style="overflow-x:auto;"><table><thead><tr><th>#</th><th>Keyword</th><th>Pos</th><th>Change</th><th>Volume</th><th>ETV</th><th>CPC</th><th>KD</th><th>Ranking URL</th></tr></thead><tbody>';
      D.keywords.topRankings.forEach(function(kw, i) {
        var changeBadge = '';
        if (kw.isNew) { changeBadge = '<span class="tag tag-blue" style="font-size:10px;">NEW</span>'; }
        else if (kw.change > 0) { changeBadge = '<span class="tag tag-green">▲ ' + kw.change + '</span>'; }
        else if (kw.change < 0) { changeBadge = '<span class="tag tag-red">▼ ' + Math.abs(kw.change) + '</span>'; }
        else { changeBadge = '<span class="tag" style="background:var(--surface-alt);color:var(--text-secondary);">—</span>'; }
        var posStyle = kw.position <= 3 ? 'color:var(--green);font-weight:700;' : (kw.position <= 10 ? 'color:var(--blue);font-weight:600;' : '');
        var kdColor = kw.kd <= 15 ? 'var(--green)' : (kw.kd <= 40 ? 'var(--orange)' : 'var(--red)');
        html += '<tr><td>' + (i + 1) + '</td><td><strong>' + kw.keyword + '</strong></td>';
        html += '<td class="mono" style="' + posStyle + '">' + kw.position + '</td>';
        html += '<td>' + changeBadge + '</td>';
        html += '<td class="mono">' + kw.volume + '</td>';
        html += '<td class="mono">' + kw.etv + '</td>';
        html += '<td class="mono">$' + kw.cpc + '</td>';
        html += '<td><span style="color:' + kdColor + ';font-weight:600;">' + kw.kd + '</span></td>';
        html += '<td style="font-size:11px;color:var(--text-secondary);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + kw.url + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    }

    html += '</div>';
  }

  // Section 04: Insights & Recommendations
  if (D.insights && D.insights.length) {
    html += '<div class="section"><div class="section-header"><div class="section-icon red">💡</div><div>' +
      '<div class="section-number">Section 04</div><div class="section-title">Key Insights &amp; Recommendations</div></div></div>';
    D.insights.forEach(function(ins) {
      html += '<div class="insight ' + ins.type + '"><span class="insight-icon">' + ins.icon + '</span>' +
        '<div class="insight-content"><h4>' + ins.title + '</h4><p>' + ins.text + '</p></div></div>';
    });
    html += '</div>';
  }

  // Footer
  html += '<div class="report-footer"><div class="footer-brand">Stambaugh Designs</div>' +
    '<p>Data sources: Google Search Console · DataForSEO · Rybbit Analytics</p>' +
    '<p style="margin-top:8px;">Questions? Contact <a href="mailto:hello@stambaughdesigns.co">hello@stambaughdesigns.co</a> · <a href="https://stambaughdesigns.co">stambaughdesigns.co</a></p>' +
    '</div></div>';

  document.getElementById('app').innerHTML = html;  // ═══ CHARTS ═══
  var fontFamily = "'Inter', -apple-system, BlinkMacSystemFont, sans-serif";
  Chart.defaults.font.family = fontFamily;
  Chart.defaults.color = '#8c7e6e';

  // Daily Clicks & Impressions
  if (D.gsc && D.gsc.available && D.gsc.dailyChart.labels.length) {
    new Chart(document.getElementById('dailyChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: D.gsc.dailyChart.labels,
        datasets: [
          { label: 'Clicks', data: D.gsc.dailyChart.clicks, backgroundColor: '#c4550a', borderRadius: 4, barPercentage: 0.6, yAxisID: 'y', order: 2 },
          { label: 'Impressions', data: D.gsc.dailyChart.impressions, type: 'line', borderColor: '#8c7e6e', backgroundColor: 'rgba(140,126,110,0.1)', fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#8c7e6e', borderWidth: 2, yAxisID: 'y1', order: 1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'top', align: 'end', labels: { usePointStyle: true, pointStyle: 'circle', padding: 20, font: { size: 11, weight: '600' } } } },
        scales: {
          y: { beginAtZero: true, position: 'left', title: { display: true, text: 'Clicks', font: { size: 11, weight: '600' } }, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 } } },
          y1: { beginAtZero: true, position: 'right', title: { display: true, text: 'Impressions', font: { size: 11, weight: '600' } }, grid: { display: false }, ticks: { font: { size: 11 } } },
          x: { grid: { display: false }, ticks: { font: { size: 10 } } }
        }
      }
    });
  }  // Device Doughnut
  if (D.gsc && D.gsc.available && D.gsc.deviceChart) {
    new Chart(document.getElementById('deviceChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: D.gsc.deviceChart.labels,
        datasets: [{ data: D.gsc.deviceChart.data, backgroundColor: ['#c4550a', '#8c7e6e', '#e8e0d8'], borderWidth: 0, cutout: '65%' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'circle', padding: 12, font: { size: 11, weight: '500' } } } }
      }
    });
  }

  // Keyword Distribution
  if (D.keywords && D.keywords.available && D.keywords.chartData) {
    new Chart(document.getElementById('keywordChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: ['Top 3', 'Pos 4–10', 'Pos 11–20', 'Pos 21–50', 'Pos 51–100'],
        datasets: [{ label: 'Keywords', data: D.keywords.chartData, backgroundColor: ['#2d7a3a', '#1a6bb5', '#1a6bb5', '#b5680a', '#c4390a'], borderRadius: 6, barPercentage: 0.65 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 } } },
          y: { grid: { display: false }, ticks: { font: { size: 11, weight: '600' } } }
        }
      }
    });
  }
})();
</script>
</body>
</html>
